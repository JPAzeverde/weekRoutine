<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Semanal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Organizador Semanal</h1>
            <div class="controls">
                <button id="btnAdicionar" class="btn-primary">+ Nova Atividade</button>
                <button id="btnLimpar" class="btn-secondary">Limpar Tudo</button>
            </div>
        </header>

        <div class="semana-grid">
            <div class="horario-header">Horário</div>
            <div class="dia-header">Segunda</div>
            <div class="dia-header">Terça</div>
            <div class="dia-header">Quarta</div>
            <div class="dia-header">Quinta</div>
            <div class="dia-header">Sexta</div>
            <div class="dia-header">Sábado</div>
            <div class="dia-header">Domingo</div>
        </div>

        <div id="gradeHorarios" class="grade-horarios"></div>
    </div>


    
    <!-- Modal para adicionar/editar atividade -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="fechar">&times;</span>
            <h2>Adicionar Atividade</h2>
            <form id="formAtividade">
                <div class="form-group">
                    <label for="nomeAtividade">Nome da Atividade:</label>
                    <input type="text" id="nomeAtividade" required maxlength="50">
                </div>
                
                <div class="form-group">
                    <label for="diaSemana">Dia da Semana:</label>
                    <select id="diaSemana" required>
                        <option value="segunda">Segunda-feira</option>
                        <option value="terca">Terça-feira</option>
                        <option value="quarta">Quarta-feira</option>
                        <option value="quinta">Quinta-feira</option>
                        <option value="sexta">Sexta-feira</option>
                        <option value="sabado">Sábado</option>
                        <option value="domingo">Domingo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="horaInicio">Hora de Início:</label>
                    <input type="time" id="horaInicio" required>
                </div>

                <div class="form-group">
                    <label for="horaFim">Hora de Término:</label>
                    <input type="time" id="horaFim" required>
                </div>

                <div class="form-group">
                    <label for="corAtividade">Cor da Atividade:</label>
                    <input type="color" id="corAtividade" value="#4CAF50">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Salvar</button>
                    <button type="button" id="btnCancelar" class="btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="tasks.js"></script>
    <script src="script.js"></script>
</body>
</html>
