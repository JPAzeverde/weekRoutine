
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Planner — estilo Google Calendar</title>
  <style>
    :root {
      /* Escala vertical: 1 hora = 120px, 1 min = 2px */
      --hour-height: 120px;            /* MUITO IMPORTANTE */
      --minute-height: 2px;            /* derivado de --hour-height */
      --hours-span: 20;                /* 04:00 → 00:00 = 20 horas */

      /* Cores (inspiradas no Google Calendar) */
      --blue: #4285f4;
      --green: #34a853;
      --purple: #a142f4;
      --red: #ea4335;
      --orange: #fbbc05;
      --teal: #00c2a8;
      --pink: #ff6db3;
      --indigo: #3f51b5;

      --bg: #fff;
      --text: #1f1f1f;
      --muted: #6b7280;
      --border: #e5e7eb;               /* cinza claro para linhas de hora */
      --shadow: 0 1px 2px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Helvetica Neue", "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: #fafafa;
    }

    .app-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .btn {
      appearance: none;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.2s ease, transform 0.02s ease;
    }
    .btn:hover { box-shadow: var(--shadow); }
    .btn:active { transform: translateY(1px); }

    .calendar {
      display: grid;
      grid-template-columns: 88px repeat(7, 1fr);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      overflow: hidden;
    }

    /* Cabeçalho dos dias */
    .header-row {
      display: contents; /* permite células de cabeçalho alinharem-se nas colunas da grade */
    }
    .time-header, .day-header {
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 3;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .time-header { color: var(--muted); font-weight: 700; }
    .day-header {
      text-align: center;
    }

    /* Corpo do calendário (área rolável verticalmente) */
    .calendar-body {
      display: contents;
    }

    .time-column {
      position: relative;
      height: calc(var(--hour-height) * var(--hours-span));
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent calc(var(--hour-height) - 1px),
        var(--border) calc(var(--hour-height) - 1px),
        var(--border) var(--hour-height)
      );
    }

    .time-label {
      position: absolute;
      left: 8px;
      font-size: 12px;
      color: var(--muted);
      transform: translateY(-50%);
      background: #fff;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .day-column {
      position: relative;
      height: calc(var(--hour-height) * var(--hours-span));
      border-left: 1px solid var(--border);
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent calc(var(--hour-height) - 1px),
        var(--border) calc(var(--hour-height) - 1px),
        var(--border) var(--hour-height)
      );
      overflow: hidden;
    }

    /* Bloco de tarefa */
    .task {
      position: absolute;
      left: 6px;
      right: 6px;
      border-radius: 10px;
      background: #ddd; /* será sobrescrito por cores */
      color: #fff;
      padding: 8px 10px 8px 12px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .task .title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.2px;
      color: #fff;
    }
    .task .time {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
    }
    .task .subtasks {
      font-size: 11px;
      line-height: 1.25;
      color: rgba(255,255,255,0.94);
    }
    .task .close {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.5);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 12px;
      color: #fff;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    .task .close:hover { background: rgba(255,255,255,0.35); }

    /* Paleta de cores para tarefas */
    .task.blue   { background: var(--blue); }
    .task.green  { background: var(--green); }
    .task.purple { background: var(--purple); }
    .task.red    { background: var(--red); }
    .task.orange { background: var(--orange); color: #222; }
    .task.teal   { background: var(--teal); }
    .task.pink   { background: var(--pink); }
    .task.indigo { background: var(--indigo); }

    /* Barra fixa inferior em telas pequenas */
    .legend {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend .dot {
      width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin-right: 6px;
    }

    /* Modal simples para criação de tarefas */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.22);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 10;
    }
    .modal.show { display: flex; }
    .dialog {
      width: min(560px, 95vw);
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 16px;
    }
    .dialog h3 { margin: 0 0 8px; }
    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
    }
    .form .full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    input[type="text"], input[type="time"], select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    textarea { min-height: 76px; }
    .dialog .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    /* Responsividade */
    @media (max-width: 1024px) {
      .calendar { overflow-x: auto; }
      .calendar { grid-template-columns: 72px repeat(7, minmax(220px, 1fr)); }
    }
    @media (max-width: 680px) {
      .topbar { grid-template-columns: 1fr; gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="title">Weekly Planner — Minimal (clone Google Calendar)</div>
      <button class="btn" id="addBtn">➕ Adicionar tarefa</button>
      <button class="btn" id="resetBtn">🔄 Resetar para rotina padrão</button>
    </div>

    <div class="calendar" id="calendar">
      <!-- Cabeçalho -->
      <div class="header-row">
        <div class="time-header">Horários</div>
        <div class="day-header">Segunda</div>
        <div class="day-header">Terça</div>
        <div class="day-header">Quarta</div>
        <div class="day-header">Quinta</div>
        <div class="day-header">Sexta</div>
        <div class="day-header">Sábado</div>
        <div class="day-header">Domingo</div>
      </div>

      <!-- Corpo -->
      <div class="time-column" id="timeCol"></div>
      <div class="day-column" data-day="Segunda"></div>
      <div class="day-column" data-day="Terça"></div>
      <div class="day-column" data-day="Quarta"></div>
      <div class="day-column" data-day="Quinta"></div>
      <div class="day-column" data-day="Sexta"></div>
      <div class="day-column" data-day="Sábado"></div>
      <div class="day-column" data-day="Domingo"></div>
    </div>

    <div class="legend">
      <span><span class="dot" style="background: var(--blue)"></span>Trabalho</span>
      <span><span class="dot" style="background: var(--purple)"></span>Universidade</span>
      <span><span class="dot" style="background: var(--green)"></span>Academia</span>
      <span><span class="dot" style="background: var(--orange)"></span>Refeições</span>
      <span><span class="dot" style="background: var(--teal)"></span>Rotina</span>
      <span><span class="dot" style="background: var(--red)"></span>Serviços</span>
      <span><span class="dot" style="background: var(--indigo)"></span>Higiene</span>
      <span><span class="dot" style="background: var(--pink)"></span>Outros</span>
    </div>
  </div>

  <!-- Modal de criação -->
  <div class="modal" id="modal">
    <div class="dialog">
      <h3>Nova tarefa</h3>
      <form class="form" id="taskForm">
        <div>
          <label>Dia</label>
          <select name="day" required>
            <option>Segunda</option>
            <option>Terça</option>
            <option>Quarta</option>
            <option>Quinta</option>
            <option>Sexta</option>
            <option>Sábado</option>
            <option>Domingo</option>
          </select>
        </div>
        <div>
          <label>Título</label>
          <input type="text" name="title" placeholder="Ex.: Trabalho" required />
        </div>
        <div>
          <label>Início</label>
          <input type="time" name="start" required value="08:00" />
        </div>
        <div>
          <label>Fim</label>
          <input type="time" name="end" required value="09:00" />
        </div>
        <div>
          <label>Cor</label>
          <select name="color" required>
            <option value="blue">Azul</option>
            <option value="purple">Roxo</option>
            <option value="green">Verde</option>
            <option value="orange">Laranja</option>
            <option value="teal">Verde-água</option>
            <option value="red">Vermelho</option>
            <option value="indigo">Índigo</option>
            <option value="pink">Rosa</option>
          </select>
        </div>
        <div class="full">
          <label>Subtarefas (separe por vírgulas)</label>
          <textarea name="subtasks" placeholder="Ex.: Ir para academia, Alongar, Trocar de roupa"></textarea>
        </div>
        <div class="actions full">
          <button type="button" class="btn" id="cancelBtn">Cancelar</button>
          <button type="submit" class="btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ==========================
    // Configuração & Utilitários
    // ==========================
    const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
    const START_MIN = 4 * 60;   // 04:00
    const END_MIN   = 24 * 60;  // 24:00 (00:00 do dia seguinte)
    const MINUTE_PX = 2;        // 1 minuto = 2px (1 hora = 120px)
    const STORAGE_KEY = 'weeklyPlannerData_v1';

    function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

    function parseTimeToMinutes(tStr) {
      // tStr: "HH:MM" — trata 00:00 como 24:00 quando usado como horário final
      const [hStr, mStr] = tStr.split(':');
      let h = parseInt(hStr, 10);
      const m = parseInt(mStr, 10);
      if (h === 0) h = 24; // considera 00:00 => 24:00
      return (h * 60) + m;
    }

    function clampToRange(mins) {
      return Math.max(START_MIN, Math.min(END_MIN, mins));
    }

    function computeBlockPosition(startStr, endStr) {
      let start = parseTimeToMinutes(startStr);
      let end   = parseTimeToMinutes(endStr);
      start = clampToRange(start);
      end   = clampToRange(end);
      if (end <= start) end = Math.min(start + 15, END_MIN); // garante altura mínima de 15min
      const top = (start - START_MIN) * MINUTE_PX;
      const height = (end - start) * MINUTE_PX;
      return { top, height };
    }

    // ==========================
    // Template de Rotina Padrão
    // Personalizado ao perfil do Joao Pedro (estágio 12-18, treino pela manhã)
    // ==========================
    function defaultDay(isWeekend, hasUniversity) {
      const tasks = [];
      // Acordar
      tasks.push({ id: uid(), title: 'Acordar', start: '06:30', end: '06:45', color: 'teal', subtasks: ['Escutar alarme', 'Levantar', 'Abrir janela'] });
      // Escovar dentes (manhã)
      tasks.push({ id: uid(), title: 'Escovar dentes', start: '06:45', end: '06:50', color: 'indigo', subtasks: [] });
      // Alongar
      tasks.push({ id: uid(), title: 'Alongar', start: '06:50', end: '07:00', color: 'pink', subtasks: [] });
      // Academia (manhã)
      const gymStart = isWeekend ? '09:30' : '08:00';
      const gymEnd   = isWeekend ? '11:00' : '09:30';
      tasks.push({ id: uid(), title: 'Academia', start: gymStart, end: gymEnd, color: 'green', subtasks: ['Ir para academia', 'Trocar de roupa', 'Alongar'] });
      // Banho pós-treino
      const banhoStart = isWeekend ? '11:05' : '09:35';
      const banhoEnd   = isWeekend ? '11:25' : '09:50';
      tasks.push({ id: uid(), title: 'Banho', start: banhoStart, end: banhoEnd, color: 'teal', subtasks: [] });
      // Serviços (pequenas tarefas do dia)
      const servStart = isWeekend ? '11:30' : '10:00';
      const servEnd   = isWeekend ? '12:30' : '10:45';
      tasks.push({ id: uid(), title: 'Serviços', start: servStart, end: servEnd, color: 'red', subtasks: ['Mercado', 'Pagamentos', 'Organizar'] });
      // Almoço
      const almStart = isWeekend ? '13:00' : '11:00';
      const almEnd   = isWeekend ? '13:40' : '11:30';
      tasks.push({ id: uid(), title: 'Almoçar', start: almStart, end: almEnd, color: 'orange', subtasks: ['Fazer almoço'] });

      if (!isWeekend) {
        // Trabalho/Estágio (12:00 – 18:00 conforme perfil)
        tasks.push({ id: uid(), title: 'Trabalho / Estágio', start: '12:00', end: '18:00', color: 'blue', subtasks: ['Check-in', 'Reuniões', 'Entregas'] });
        // Lanchar (tarde)
        tasks.push({ id: uid(), title: 'Lanchar', start: '16:00', end: '16:15', color: 'orange', subtasks: [] });
      } else {
        // Lazer/Serviços à tarde no fim de semana
        tasks.push({ id: uid(), title: 'Lazer', start: '16:00', end: '17:30', color: 'pink', subtasks: ['Passeio', 'Descanso'] });
      }

      // Universidade (noite em dias selecionados)
      if (hasUniversity) {
        tasks.push({ id: uid(), title: 'Ir para Unilavras', start: '18:30', end: '18:50', color: 'teal', subtasks: ['Trocar de roupa'] });
        tasks.push({ id: uid(), title: 'Universidade', start: '19:00', end: '22:00', color: 'purple', subtasks: ['Ir para Unilavras'] });
        tasks.push({ id: uid(), title: 'Jantar', start: '22:05', end: '22:35', color: 'orange', subtasks: ['Fazer janta'] });
      } else {
        // Jantar sem universidade
        tasks.push({ id: uid(), title: 'Jantar', start: '20:30', end: '21:00', color: 'orange', subtasks: ['Fazer janta'] });
      }

      // Escovar dentes (noite)
      tasks.push({ id: uid(), title: 'Escovar dentes', start: hasUniversity ? '22:40' : '21:05', end: hasUniversity ? '22:45' : '21:10', color: 'indigo', subtasks: [] });
      // Dormir (dentro da janela até 00:00)
      tasks.push({ id: uid(), title: 'Dormir', start: '23:20', end: '00:00', color: 'teal', subtasks: [] });

      return tasks;
    }

    function buildDefaultData() {
      const data = { days: {} };
      data.days['Segunda'] = defaultDay(false, true);
      data.days['Terça']   = defaultDay(false, false);
      data.days['Quarta']  = defaultDay(false, true);
      data.days['Quinta']  = defaultDay(false, false);
      data.days['Sexta']   = defaultDay(false, true);
      data.days['Sábado']  = defaultDay(true,  false);
      data.days['Domingo'] = defaultDay(true,  false);
      return data;
    }

    // ==========================
    // Renderização
    // ==========================
    let state = null;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { state = JSON.parse(raw); }
        catch { state = buildDefaultData(); }
      } else {
        state = buildDefaultData();
      }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderTimeColumn() {
      const timeCol = document.getElementById('timeCol');
      timeCol.innerHTML = '';
      // Renderiza labels de hora de 04:00 a 23:00 (20 linhas)
      for (let hour = 4; hour < 24; hour++) {
        const top = (hour - 4) * 60 * MINUTE_PX; // minutos desde 04:00 em px
        const label = document.createElement('div');
        label.className = 'time-label';
        label.style.top = top + 'px';
        label.textContent = String(hour).padStart(2,'0') + ':00';
        timeCol.appendChild(label);
      }
    }

    function renderTasks() {
      document.querySelectorAll('.day-column').forEach(col => col.innerHTML = '');
      for (const day of DAYS) {
        const col = document.querySelector(`.day-column[data-day="${day}"]`);
        const tasks = (state.days[day] || []);
        tasks.forEach(task => {
          const { top, height } = computeBlockPosition(task.start, task.end);
          const el = document.createElement('div');
          el.className = `task ${task.color || ''}`;
          el.style.top = top + 'px';
          el.style.height = height + 'px';
          el.setAttribute('title', `${task.title} — ${task.start}–${task.end}`);

          const row = document.createElement('div');
          row.className = 'row';
          const tTitle = document.createElement('div');
          tTitle.className = 'title';
          tTitle.textContent = task.title;
          const tTime = document.createElement('div');
          tTime.className = 'time';
          tTime.textContent = `${task.start} – ${task.end}`;
          const close = document.createElement('button');
          close.className = 'close';
          close.textContent = '×';
          close.addEventListener('click', (ev) => {
            ev.stopPropagation();
            removeTask(day, task.id);
          });
          row.appendChild(tTitle);
          row.appendChild(tTime);
          row.appendChild(close);
          el.appendChild(row);

          if (task.subtasks && task.subtasks.length) {
            const subs = document.createElement('div');
            subs.className = 'subtasks';
            subs.textContent = '• ' + task.subtasks.join(' • ');
            el.appendChild(subs);
          }

          el.addEventListener('dblclick', () => removeTask(day, task.id));
          col.appendChild(el);
        });
      }
    }

    function removeTask(day, id) {
      const tasks = state.days[day] || [];
      const idx = tasks.findIndex(t => t.id === id);
      if (idx >= 0) {
        tasks.splice(idx, 1);
        saveState();
        renderTasks();
      }
    }

    // ==========================
    // CRUD - Adicionar
    // ==========================
    const modal = document.getElementById('modal');
    const addBtn = document.getElementById('addBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const form = document.getElementById('taskForm');

    addBtn.addEventListener('click', () => modal.classList.add('show'));
    cancelBtn.addEventListener('click', () => modal.classList.remove('show'));

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const day = fd.get('day');
      const title = String(fd.get('title') || '').trim();
      const start = String(fd.get('start'));
      const end = String(fd.get('end'));
      const color = fd.get('color');
      const subtasksStr = String(fd.get('subtasks') || '');
      const subtasks = subtasksStr.split(',').map(s => s.trim()).filter(Boolean);

      // Validações básicas
      const sMin = parseTimeToMinutes(start);
      const eMin = parseTimeToMinutes(end);
      if (sMin < START_MIN) {
        alert('O horário de início deve ser >= 04:00.');
        return;
      }
      if (eMin > END_MIN) {
        alert('O horário de término deve ser <= 00:00.');
        return;
      }
      if (eMin <= sMin) {
        alert('O término deve ser após o início.');
        return;
      }

      const task = { id: uid(), title, start, end, color, subtasks };
      state.days[day] = state.days[day] || [];
      state.days[day].push(task);
      saveState();
      renderTasks();
      modal.classList.remove('show');
      form.reset();
    });

    // ==========================
    // Resetar template
    // ==========================
    const resetBtn = document.getElementById('resetBtn');
    resetBtn.addEventListener('click', () => {
      if (confirm('Isso apagará seus dados atuais e restaurará a rotina padrão. Deseja continuar?')) {
        state = buildDefaultData();
        saveState();
        renderTasks();
      }
    });

    // ==========================
    // Inicialização
    // ==========================
    function init() {
      loadState();
      renderTimeColumn();
      renderTasks();
    }
    init();
  </script>
</body>
</html>
